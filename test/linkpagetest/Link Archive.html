<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>リンク一覧 — Archive</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{ box-sizing:border-box }
  :root{
    --bg: #111015;
    --paper: #1b171f;
    --ink: #ffeaf2;
    --ink-soft: #f2c8d9;
    --mute: #b98fa2;
    --line: #3a2b35;
    --accent: #ff9ec2;
    --accent-soft: #3a2230;
    --tag-bg: #2a2028;
    --tag-bg-active: #ffd6e7;
    --tag-text-active: #111111;
  }

  html,body{ margin:0; padding:0; background: var(--bg); color: var(--ink); }
  body{
    font-family: "Noto Sans JP", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .wrap{ max-width: 920px; margin: 0 auto; padding: 56px 32px 80px; }
  @media (max-width: 700px){ .wrap{ padding: 28px 18px 60px } }

  /* ─── Header ─── */
  header.top{ margin-bottom: 36px }
  .h-row{
    display:flex; align-items: baseline; gap: 14px;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 12px;
    flex-wrap: wrap;
  }
  h1{
    font-family: "Reggae One", system-ui, sans-serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: .04em;
    margin: 0;
  }
  .h-en{
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: .22em;
    color: var(--mute);
    text-transform: uppercase;
    margin-left: auto;
  }
  .meta-line{
    margin-top: 10px;
    font-size: 12px;
    color: var(--mute);
    font-family: "JetBrains Mono", monospace;
    letter-spacing: .04em;
    display:flex; gap:18px; flex-wrap: wrap;
  }
  .meta-line b{ color: var(--ink); font-weight: 500 }

  /* ─── Search ─── */
  .search{
    margin-top: 28px;
    display:flex; align-items:center; gap: 10px;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 2px;
    padding: 10px 14px;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .search:focus-within{
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(255,116,92,.14);
  }
  .search svg{ flex-shrink:0; color: var(--mute) }
  .search input{
    appearance:none; border:0; background:transparent; outline:none;
    flex: 1; min-width: 0;
    font: inherit;
    color: var(--ink);
    font-size: 14px;
  }
  .search .clear{
    appearance:none; border:0; background:transparent;
    color: var(--mute); cursor:default;
    padding: 2px 6px; border-radius: 999px;
    font-size: 12px;
  }
  .search .clear:hover{ color: var(--ink); background: var(--bg) }

  /* ─── Tag cloud ─── */
  .tags-wrap{ margin-top: 18px }
  .tags-label{
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--mute); font-family: "JetBrains Mono", monospace;
    margin-bottom: 8px;
  }
  .tags{
    display:flex; flex-wrap:wrap; gap: 6px;
  }
  .tag{
    appearance:none; border:0;
    font: inherit;
    font-size: 12px;
    color: var(--ink-soft);
    background: var(--tag-bg);
    padding: 4px 10px;
    border-radius: 999px;
    cursor: default;
    transition: background .15s ease, color .15s ease, transform .15s ease;
    display:inline-flex; align-items:center; gap: 6px;
    white-space: nowrap;
  }
  .tag:hover{ background: #3a2a36 }
  .tag.active{
    background: var(--tag-bg-active);
    color: var(--tag-text-active);
  }
  .tag .count{
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    color: var(--mute);
    font-variant-numeric: tabular-nums;
  }
  .tag.active .count{ color: rgba(250,247,240,.6) }

  /* ─── Year + post list ─── */
  .year-section{ margin-top: 40px }
  .year-head{
    display:flex; align-items: baseline; gap: 14px;
    padding-bottom: 8px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .year-head h2{
    font-family: "Reggae One", system-ui, sans-serif;
    font-size: 22px; font-weight: 500;
    margin: 0;
    letter-spacing: .04em;
  }
  .year-head .y-count{
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--mute);
  }

  .post{
    position: relative;
    display: grid;
    grid-template-columns: 78px 1fr;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px dashed var(--line);
    transition: background .15s ease;
  }
  .post:hover{ background: rgba(255,255,255,.035) }
  .post:hover{ z-index: 5 }
  @media (max-width: 600px){
    .post{ grid-template-columns: 60px 1fr; gap: 10px }
  }

  .p-date{
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--mute);
    line-height: 1.4;
    padding-top: 2px;
  }
  .p-date .md{ color: var(--ink); font-weight: 500; font-size: 13px }
  .p-date .hm{ display:block; color: var(--mute); font-size: 11px; margin-top:1px }

  .p-body{ display:flex; flex-direction: column; gap: 6px; min-width:0 }
  .p-title{
    margin: 0;
    font-size: 15px; font-weight: 500;
    line-height: 1.5;
    color: var(--ink);
    text-wrap: pretty;
    position: relative;
    overflow: hidden;
  }
  .p-title a{
    color: inherit; text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .15s ease, color .15s ease;
    display: inline-flex;
    max-width: 100%;
    white-space: nowrap;
  }
  .p-title::before{
    content:"";
    position:absolute;
    inset:0 auto 0 0;
    width: 42px;
    pointer-events:none;
    opacity:0;
    z-index:2;
    background: linear-gradient(90deg, var(--bg), rgba(17,16,21,0));
    transition: opacity .18s ease;
  }
  .post:hover .p-title::before{ opacity:1 }
  .post:hover .p-title a{
    animation: title-marquee 7s linear infinite;
    border-bottom-color: currentColor;
  }
  @keyframes title-marquee{
    0%, 12%{ transform: translateX(0) }
    82%, 100%{ transform: translateX(calc(-100% + min(100%, 560px))) }
  }
  .p-title a:hover{ color: var(--accent); border-bottom-color: currentColor }
  .p-title .arrow{
    display: inline-block;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--mute);
    margin-left: 4px;
    transition: transform .15s ease, color .15s ease;
  }
  .p-title a:hover .arrow{ color: var(--accent); transform: translateX(2px) }
  .p-tags{ display:flex; flex-wrap: wrap; gap: 4px }
  .p-tag{
    font-size: 10.5px;
    color: var(--mute);
    background: var(--tag-bg);
    padding: 2px 7px;
    border-radius: 999px;
    cursor: default;
    transition: background .15s ease, color .15s ease;
  }
  .p-tag:hover{ background: var(--ink); color: var(--paper) }
  .p-tag.highlight{
    background: var(--accent-soft);
    color: var(--accent);
  }

  .summary-pop{
    position:absolute;
    left: 94px;
    top: calc(100% - 4px);
    width: min(520px, calc(100vw - 140px));
    display:grid;
    grid-template-columns: 112px 1fr;
    gap: 14px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(27,23,31,.97);
    box-shadow: 0 18px 50px rgba(0,0,0,.42);
    color: var(--ink);
    opacity:0;
    pointer-events:none;
    transform: translateY(8px);
    transition: opacity .16s ease, transform .16s ease;
  }
  .post:hover .summary-pop{
    opacity:1;
    transform: translateY(0);
  }
  .summary-image{
    width:112px;
    aspect-ratio: 16 / 10;
    border-radius: 8px;
    border: 1px solid var(--line);
    background:
      radial-gradient(circle at 25% 30%, rgba(255,158,194,.34), transparent 34%),
      linear-gradient(135deg, #271a24, #141219 70%);
    display:grid;
    place-items:center;
    color: var(--mute);
    font-size: 11px;
    overflow:hidden;
  }
  .summary-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .summary-text{
    min-width:0;
    font-size: 12.5px;
    line-height:1.75;
    color: var(--ink-soft);
  }
  .summary-text b{
    display:block;
    margin-bottom: 4px;
    color: var(--ink);
    font-size: 12px;
    letter-spacing:.08em;
  }
  @media (max-width: 700px){
    .summary-pop{
      left: 0;
      width: min(100%, calc(100vw - 36px));
      grid-template-columns: 1fr;
    }
    .summary-image{ width:100% }
  }

  /* ─── Highlights for search match ─── */
  mark{
    background: var(--accent-soft);
    color: var(--accent);
    padding: 0 2px;
    border-radius: 2px;
  }

  /* ─── Empty ─── */
  .empty{
    text-align:center;
    padding: 60px 20px;
    color: var(--mute);
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
  }

  /* ─── Back-to-top ─── */
  .top-btn{
    position: fixed;
    right: 24px; bottom: 24px;
    appearance:none; border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: default;
    font-size: 16px;
    display: grid; place-items: center;
    box-shadow: 0 4px 18px rgba(0,0,0,.35);
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    transform: translateY(8px);
  }
  .top-btn.show{ opacity: 1; pointer-events: auto; transform: none }
  .top-btn:hover{ background: var(--ink); color: var(--paper); border-color: var(--ink) }
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="h-row">
      <h1>リンク一覧</h1>
      <span class="h-en">LINK ARCHIVE</span>
    </div>
    <div class="meta-line">
      <span>全 <b id="totalCount">—</b> 件</span>
      <span>表示 <b id="shownCount">—</b> 件</span>

    </div>

    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="search" placeholder="タイトル・タグで検索…" autocomplete="off" />
      <button class="clear" id="clearBtn" hidden>✕ クリア</button>
    </div>

    <div class="tags-wrap">
      <div class="tags-label">TAGS — クリックで絞り込み</div>
      <div class="tags" id="tagCloud"></div>
    </div>
  </header>

  <main id="list"></main>
</div>

<button class="top-btn" id="topBtn" aria-label="ページ上部へ">↑</button>

    const [title, dt, url, tagsStr] = line.split('|');
    const tags = (tagsStr || '').split(',').filter(Boolean);
    const date = new Date(dt.replace(' ', 'T') + '+09:00');
    const cleanTitle = title.trim();
    const cleanDt = dt.trim();
    return {
      title: cleanTitle,
      dt: cleanDt,
      url: url.trim(),
      tags,
      date,
      summary: `${cleanTitle} の記録。${cleanDt} に保存された放送リンクです。${tags.length ? `関連タグ: ${tags.join('、')}` : '関連タグは未設定です。'}`,
      summaryImage: ''
    };
  });

  // Sort newest first
  POSTS.sort((a, b) => b.date - a.date);

  // ── Tag counts ──
  const tagCount = {};
  POSTS.forEach(p => p.tags.forEach(t => { tagCount[t] = (tagCount[t]||0) + 1; }));
  const sortedTags = Object.keys(tagCount).sort((a, b) => tagCount[b] - tagCount[a]);

  // ── State ──
  let q = '';
  let activeTags = new Set();

  // ── DOM refs ──
  const $list = document.getElementById('list');
  const $tagCloud = document.getElementById('tagCloud');
  const $search = document.getElementById('search');
  const $clear = document.getElementById('clearBtn');
  const $totalCount = document.getElementById('totalCount');
  const $shownCount = document.getElementById('shownCount');
  const $dateRange = document.getElementById('dateRange');
  const $topBtn = document.getElementById('topBtn');

  $totalCount.textContent = POSTS.length.toLocaleString();
  if (POSTS.length){
    const fmt = d => d.toISOString().slice(0,10).replace(/-/g,'.');
    $dateRange.textContent = `${fmt(POSTS[POSTS.length-1].date)} → ${fmt(POSTS[0].date)}`;
  }

  // ── Build tag cloud ──
  function buildTagCloud(){
    $tagCloud.innerHTML = '';
    sortedTags.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'tag' + (activeTags.has(name) ? ' active' : '');
      btn.innerHTML = `<span>${escapeHtml(name)}</span><span class="count">${tagCount[name]}</span>`;
      btn.addEventListener('click', () => {
        if (activeTags.has(name)) activeTags.delete(name);
        else activeTags.add(name);
        buildTagCloud();
        render();
      });
      $tagCloud.appendChild(btn);
    });
  }

  // ── Render list ──
  function render(){
    const ql = q.toLowerCase().trim();
    const filtered = POSTS.filter(p => {
      if (activeTags.size){
        for (const t of activeTags) if (!p.tags.includes(t)) return false;
      }
      if (ql){
        const hay = (p.title + ' ' + p.tags.join(' ')).toLowerCase();
        if (!hay.includes(ql)) return false;
      }
      return true;
    });

    $shownCount.textContent = filtered.length.toLocaleString();

    if (!filtered.length){
      $list.innerHTML = `<div class="empty">該当なし — 検索条件を変えてください</div>`;
      return;
    }

    // Group by year
    const byYear = {};
    filtered.forEach(p => {
      const y = p.date.getFullYear();
      (byYear[y] = byYear[y] || []).push(p);
    });
    const years = Object.keys(byYear).sort((a,b) => b - a);

    let html = '';
    for (const y of years){
      html += `<section class="year-section">
        <header class="year-head">
          <h2>${y}</h2>
          <span class="y-count">${byYear[y].length}件</span>
        </header>`;
      for (const p of byYear[y]){
        const md = p.dt.slice(5,10).replace('-','/');
        const hm = p.dt.slice(11,16);
        const titleHtml = highlight(p.title, ql);
        const tagsHtml = p.tags.map(t => {
          const cls = activeTags.has(t) ? 'p-tag highlight' : 'p-tag';
          return `<span class="${cls}" data-tag="${escapeAttr(t)}">${escapeHtml(t)}</span>`;
        }).join('');
        const summaryImageHtml = p.summaryImage
          ? `<img src="${escapeAttr(p.summaryImage)}" alt="">`
          : `<span>summary<br>image</span>`;
        html += `<article class="post">
          <div class="p-date"><span class="md">${md}</span><span class="hm">${hm}</span></div>
          <div class="p-body">
            <p class="p-title"><a href="${escapeAttr(p.url)}" target="_blank" rel="noopener">${titleHtml}<span class="arrow">→</span></a></p>
            ${tagsHtml ? `<div class="p-tags">${tagsHtml}</div>` : ''}
          </div>
          <div class="summary-pop" aria-hidden="true">
            <div class="summary-image">${summaryImageHtml}</div>
            <div class="summary-text"><b>SUMMARY</b>${escapeHtml(p.summary)}</div>
          </div>
        </article>`;
      }
      html += `</section>`;
    }
    $list.innerHTML = html;

    // Wire post-tag clicks
    $list.querySelectorAll('.p-tag').forEach(el => {
      el.addEventListener('click', () => {
        const t = el.dataset.tag;
        if (activeTags.has(t)) activeTags.delete(t);
        else activeTags.add(t);
        buildTagCloud();
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s){ return escapeHtml(s); }
  function highlight(s, q){
    const safe = escapeHtml(s);
    if (!q) return safe;
    const re = new RegExp(escapeRe(q), 'gi');
    return safe.replace(re, m => `<mark>${m}</mark>`);
  }
  function escapeRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  // ── Wire up ──
  $search.addEventListener('input', e => {
    q = e.target.value;
    $clear.hidden = !q;
    render();
  });
  $clear.addEventListener('click', () => {
    q = '';
    $search.value = '';
    $clear.hidden = true;
    render();
    $search.focus();
  });

  // Top button
  window.addEventListener('scroll', () => {
    $topBtn.classList.toggle('show', window.scrollY > 400);
  }, { passive: true });
  $topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  // Initial render
  buildTagCloud();
  render();
})();
</script>

</body>
</html>
