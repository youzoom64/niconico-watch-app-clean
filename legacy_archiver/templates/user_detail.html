<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Chat Data</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Noto Serif JP", serif;
        background-color: black;
        color: white;
      }
      #chat-data {
        display: none;
      }
      a {
        color: #add8e6;
      }
      a:hover {
        color: #ffa07a;
      }
      button {
        background-color: #555;
        color: white;
      }
      table {
        border-color: white;
      }
      .image-container {
        position: relative;
        width: 400px;
        height: 400px;
        margin: 0 auto;
      }
      .background {
        position: absolute;
        display: block;
        top: 0;
        left: 0;
        z-index: 0;
      }
      .background-circle {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(
          circle at center,
          transparent 0%,
          transparent 0%,
          black 70%,
          black 70%
        );
        z-index: 3;
      }
      .foreground-image {
        position: absolute;
        z-index: 0;
        width: 400px;
        border-radius: 50%;
        top: 0;
        left: 0;
        filter: sepia(100%);
      }

      .wave-canvas {
        position: absolute;
        z-index: 2;
        width: 395px;
        height: 395px;
        border-radius: 50%;
        top: 1px;
        left: 2px;
      }

      .particles-background {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: -1;
      }
      p {
        text-shadow: 2px 2px 4px #2e2e2e;
      }
      h1 {
        text-shadow: 2px 2px 4px #2e2e2e;
      }
    </style>
  </head>

  <body>
    <h1 style="text-align: center">{{broadcast_title}}</h1>
    <p style="text-align: center"><b>{{start_time}}</b></p>
    <br /><br /><br /><br />
    <h1 style="font-size: 70px; color: red; text-align: center">対象者</h1>
    <div class="image-container">
      <div class="background-circle"></div>
      <img
        class="foreground-image"
        src="{{user_avatar}}"
        alt="Thumbnail"
        style="display: none"
        onerror="this.src='https://secure-dcdn.cdn.nimg.jp/nicoaccount/usericon/defaults/blank.jpg'"
      />
      <canvas class="wave-canvas" width="150" height="150"></canvas>
    </div>
    <p style="font-size: 50px; color: red; text-align: center">
      <b><a href="{{user_profile_url}}">{{user_name}}</a></b>
    </p>
    <p style="color: red; text-align: center">
      <b>アカウントID:{{user_id}}</b>
    </p>
    <div style="display: flex; justify-content: center; font-size: 40px">
      <button
        onclick="toggleDiv()"
        style="font-size: 20px; padding: 10px 20px; width: 200px; height: 60px"
      >
        コメントを表示
      </button>
    </div>
    <div
      id="chat-data"
      style="display: none; justify-content: center; align-items: center"
    >
      <table border="1">
        <thead>
          <tr>
            <th>コメント番号</th>
            <th>放送内時間</th>
            <th>日時</th>
            <th>コメント内容</th>
          </tr>
        </thead>
        <tbody>
          {{comment_rows}}
        </tbody>
      </table>
    </div>
    <h1 style="font-size: 50px; color: red">コメント分析結果</h1>
    <p>
      <b style="font-size: 20px; color: red"> {{analysis_text}} </b>
    </p>
    <br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br />

    <canvas
      class="particles-background"
      width="1889"
      height="911"
      style="width: 100%; height: 100%"
    ></canvas>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var div = document.getElementById("chat-data");
        div.style.display = "none";
      });

      function toggleDiv() {
        var div = document.getElementById("chat-data");
        if (div.style.display === "none") {
          div.style.display = "block";
        } else {
          div.style.display = "none";
        }
      }
    </script>
    <script>
      const field = document.querySelector(".particles-background");
      const fieldContext = field.getContext("2d", { alpha: false });
      const fieldMouse = { x: -9999, y: -9999 };
      const fieldColors = ["255,59,48", "128,0,0", "255,99,71", "255,212,92"];
      const fieldParticles = [];
      let fieldWidth = 0;
      let fieldHeight = 0;
      let fieldRatio = 1;

      function resizeField() {
        fieldWidth = window.innerWidth;
        fieldHeight = window.innerHeight;
        fieldRatio = Math.min(window.devicePixelRatio || 1, 1.5);
        field.width = Math.round(fieldWidth * fieldRatio);
        field.height = Math.round(fieldHeight * fieldRatio);
        field.style.width = fieldWidth + "px";
        field.style.height = fieldHeight + "px";
        fieldContext.setTransform(fieldRatio, 0, 0, fieldRatio, 0, 0);
        const count = Math.max(70, Math.min(150, Math.round(fieldWidth * fieldHeight / 11000)));
        while (fieldParticles.length < count) {
          fieldParticles.push({
            x: Math.random() * fieldWidth,
            y: Math.random() * fieldHeight,
            vx: (Math.random() - 0.5) * 0.28,
            vy: (Math.random() - 0.5) * 0.28,
            radius: 0.8 + Math.random() * 2.2,
            color: fieldColors[Math.floor(Math.random() * fieldColors.length)]
          });
        }
        fieldParticles.length = count;
      }

      function drawField() {
        fieldContext.fillStyle = "#02050a";
        fieldContext.fillRect(0, 0, fieldWidth, fieldHeight);
        const cellSize = 120;
        const grid = new Map();
        for (let i = 0; i < fieldParticles.length; i++) {
          const particle = fieldParticles[i];
          let dx = particle.x - fieldMouse.x;
          let dy = particle.y - fieldMouse.y;
          let distance = Math.hypot(dx, dy);
          if (distance < 140) {
            particle.vx += dx / (distance || 1) * 0.008;
            particle.vy += dy / (distance || 1) * 0.008;
          }
          particle.x += particle.vx;
          particle.y += particle.vy;
          if (particle.x < 0 || particle.x > fieldWidth) particle.vx *= -1;
          if (particle.y < 0 || particle.y > fieldHeight) particle.vy *= -1;
          const gridX = Math.floor(particle.x / cellSize);
          const gridY = Math.floor(particle.y / cellSize);
          const gridKey = `${gridX},${gridY}`;
          if (!grid.has(gridKey)) grid.set(gridKey, []);
          grid.get(gridKey).push(i);
        }
        for (let i = 0; i < fieldParticles.length; i++) {
          const particle = fieldParticles[i];
          const gridX = Math.floor(particle.x / cellSize);
          const gridY = Math.floor(particle.y / cellSize);
          for (let offsetY = -1; offsetY <= 1; offsetY++) {
            for (let offsetX = -1; offsetX <= 1; offsetX++) {
              const nearby = grid.get(`${gridX + offsetX},${gridY + offsetY}`) || [];
              for (const j of nearby) {
                if (j <= i) continue;
                const other = fieldParticles[j];
                const dx = particle.x - other.x;
                const dy = particle.y - other.y;
                const distance = Math.hypot(dx, dy);
                if (distance >= 120) continue;
                fieldContext.lineWidth = 1;
                fieldContext.strokeStyle = `rgba(${particle.color},${(1 - distance / 120) * 0.38})`;
                fieldContext.beginPath();
                fieldContext.moveTo(particle.x, particle.y);
                fieldContext.lineTo(other.x, other.y);
                fieldContext.stroke();
              }
            }
          }
        }
        for (const particle of fieldParticles) {
          fieldContext.fillStyle = `rgba(${particle.color},0.12)`;
          fieldContext.beginPath();
          fieldContext.arc(particle.x, particle.y, particle.radius * 4.5, 0, Math.PI * 2);
          fieldContext.fill();
          fieldContext.fillStyle = `rgb(${particle.color})`;
          fieldContext.beginPath();
          fieldContext.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          fieldContext.fill();
        }
        requestAnimationFrame(drawField);
      }

      window.addEventListener("resize", resizeField);
      window.addEventListener("pointermove", (event) => {
        fieldMouse.x = event.clientX;
        fieldMouse.y = event.clientY;
      });
      resizeField();
      drawField();

      function applySepiaToCanvas(context, width, height) {
        const imageData = context.getImageData(0, 0, width, height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const gray = 0.3 * data[i] + 0.59 * data[i + 1] + 0.11 * data[i + 2];
          data[i] = gray + 95;
          data[i + 1] = gray + 58;
          data[i + 2] = gray;
        }

        context.putImageData(imageData, 0, 0);
      }

      window.onload = function () {
        const imageContainer = document.querySelector(".image-container");
        const image = document.querySelector(".foreground-image");
        const canvas = document.createElement("canvas");
        canvas.className = "wave-canvas";
        const ctx = canvas.getContext("2d");
        const img = new Image();
        img.src = image.src;

        img.onload = function () {
          const canvasSize = 150;
          canvas.width = canvasSize;
          canvas.height = canvasSize;

          const dx = (canvasSize - img.width) / 2;
          const dy = (canvasSize - img.height) / 2;

          imageContainer.appendChild(canvas);
          image.style.display = "none";

          animate(dx, dy);
          applySepiaToCanvas(ctx, canvasSize, canvasSize);
        };

        let waveAmplitude = 3;
        let waveFrequency = 0.05;
        let waveOffset = 10;
        let waveSpeed = 0.03;

        function animate(dx, dy) {
          waveOffset += waveSpeed;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (let y = 0; y < img.height; y++) {
            ctx.drawImage(
              img,
              0,
              y,
              img.width,
              1,
              dx + waveAmplitude * Math.sin(y * waveFrequency + waveOffset),
              dy + y,
              img.width,
              1
            );
          }

          requestAnimationFrame(() => animate(dx, dy));
        }
      };
    </script>
  </body>
</html>
