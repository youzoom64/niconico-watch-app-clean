<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>{{broadcaster_name}}のリンク一覧</title>

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: black;
        z-index: -1;
      }

      #myCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
      }

      .comment-analysis {
        position: fixed;
        top: 20px;
        left: 0;
        width: 100vw;
        height: auto;
        color: white;
        text-align: center;
        font-size: 30px;
        font-family: "Hiragino Kaku Gothic ProN";
        font-weight: bold;
        margin: 0;
        padding: 0;
        z-index: 1;
      }

      .link-container {
        position: relative;
        top: 60px;
        left: 0;
        width: 100vw;
        height: auto;
        color: white;
        text-align: center;
        font-size: 30px;
        font-family: "Hiragino Kaku Gothic ProN";
        font-weight: bold;
        margin: 0;
        padding: 0;
        z-index: 10; /* 1から10に変更 */
      }

      /* この部分を追加 */
      .toggle-button,
      a {
        position: relative;
        z-index: 100;
        pointer-events: auto;
      }
      .chat-data {
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 75%;
      }

      .chat-data table {
        margin: 0 auto;
        color: red;
        text-shadow: 2px 2px 2px rgba(110, 110, 110, 0.5);
      }

      .link-item {
        z-index: 1;
        vertical-align: middle;
      }

      .background-circle {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(
          circle at center,
          transparent 0%,
          transparent 0%,
          black 70%,
          black 70%
        );
        z-index: 3;
      }

      .image-container {
        position: relative;
        width: 400px;
        height: 400px;
        margin: 0 auto;
      }

      .foreground-image {
        position: absolute;
        z-index: 0;
        width: 400px;
        border-radius: 50%;
        top: 0;
        left: 0;
        filter: sepia(100%);
      }

      .wave-canvas {
        position: absolute;
        z-index: -1;
        width: 395px;
        height: 395px;
        border-radius: 50%;
        top: 1px;
        left: 2px;
      }
    </style>
  </head>

  <body>
    <h1 class="comment-analysis" style="z-index: 10">
      {{broadcaster_name}}のコメント分析一覧表
    </h1>

    <br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br />

    <div
      class="link-container"
      style="top: -100px; text-shadow: 2px 2px 2px rgba(105, 105, 105, 0.5)"
    >
      <div class="image-container">
        <div class="background-circle"></div>
        <img
          alt="Thumbnail"
          class="foreground-image"
          src="{{thumbnail_url}}"
          style="display: none"
          onerror="this.src='https://secure-dcdn.cdn.nimg.jp/nicoaccount/usericon/defaults/blank.jpg'"
        />
        <canvas class="wave-canvas" height="150" width="150"></canvas>
        <canvas class="wave-canvas" width="150" height="150"></canvas>
      </div>

      {{broadcast_items}}
    </div>

    <canvas height="1080" id="myCanvas" width="1920"></canvas>

    <!-- 直接CDNを指定 -->
    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <script src="https://cdn.rawgit.com/ics-creative/ParticleJS/release/1.0.0/libs/particlejs.min.js"></script>

    <script>
      function toggleDiv(id) {
        var element = document.getElementById(id);
        if (element.style.display === "none") {
          element.style.display = "block";
          element.style.margin = "0 auto";
        } else {
          element.style.display = "none";
        }
      }
    </script>

    <script>
      // ライブラリが読み込まれているかチェック
      if (
        typeof createjs !== "undefined" &&
        typeof particlejs !== "undefined"
      ) {
        var stage = new createjs.Stage("myCanvas");
        var particleSystem1 = new particlejs.ParticleSystem();
        stage.addChild(particleSystem1.container);

        particleSystem1.importFromJson({
          bgColor: "#00000",
          width: 1024,
          height: 556,
          emitFrequency: 27,
          startX: 200,
          startXVariance: 0,
          startY: 800,
          startYVariance: 0,
          initialDirection: 90,
          initialDirectionVariance: 360,
          initialSpeed: 0.2,
          initialSpeedVariance: 0,
          friction: "0.063",
          accelerationSpeed: 0.2265,
          accelerationDirection: 270,
          startScale: 2,
          startScaleVariance: 0,
          finishScale: 0,
          finishScaleVariance: 0.31,
          lifeSpan: 200,
          lifeSpanVariance: 7,
          startAlpha: 1,
          startAlphaVariance: "0",
          finishAlpha: 0,
          finishAlphaVariance: 1,
          shapeIdList: ["blur_circle"],
          startColor: {
            hue: "17",
            hueVariance: "32",
            saturation: "91",
            saturationVariance: 15,
            luminance: "56",
            luminanceVariance: "16",
          },
          blendMode: true,
          alphaCurveType: "1",
          VERSION: "1.0.0",
        });

        var particleSystem2 = new particlejs.ParticleSystem();
        stage.addChild(particleSystem2.container);

        particleSystem2.importFromJson({
          bgColor: "#00000",
          width: 1024,
          height: 556,
          emitFrequency: 27,
          startX: 1720,
          startXVariance: 0,
          startY: 800,
          startYVariance: 0,
          initialDirection: 90,
          initialDirectionVariance: 360,
          initialSpeed: 0.2,
          initialSpeedVariance: 0,
          friction: "0.063",
          accelerationSpeed: 0.2265,
          accelerationDirection: 270,
          startScale: 2,
          startScaleVariance: 0,
          finishScale: 0,
          finishScaleVariance: 0.31,
          lifeSpan: 200,
          lifeSpanVariance: 7,
          startAlpha: 1,
          startAlphaVariance: "0",
          finishAlpha: 0,
          finishAlphaVariance: 1,
          shapeIdList: ["blur_circle"],
          startColor: {
            hue: "17",
            hueVariance: "32",
            saturation: "91",
            saturationVariance: 15,
            luminance: "56",
            luminanceVariance: "16",
          },
          blendMode: true,
          alphaCurveType: "1",
          VERSION: "1.0.0",
        });

        var snowParticleSystem = new particlejs.ParticleSystem();
        stage.addChild(snowParticleSystem.container);

        snowParticleSystem.importFromJson({
          bgColor: "#00000",
          width: 1920,
          height: 1080,
          emitFrequency: 20,
          startX: 1920 / 2,
          startXVariance: 1920,
          startY: -8,
          startYVariance: 0,
          initialDirection: 90,
          initialDirectionVariance: 33,
          initialSpeed: 1.2,
          initialSpeedVariance: 0.3,
          friction: 0,
          accelerationSpeed: 0,
          accelerationDirection: 81.6,
          startScale: 0.15,
          startScaleVariance: 0.32,
          finishScale: 0.15,
          finishScaleVariance: "0",
          lifeSpan: 1000,
          lifeSpanVariance: "0",
          startAlpha: "0.51",
          startAlphaVariance: "1",
          finishAlpha: "1",
          finishAlphaVariance: "0",
          shapeIdList: ["blur_circle"],
          startColor: {
            hue: "0",
            hueVariance: "0",
            saturation: "0",
            saturationVariance: 0,
            luminance: "100",
            luminanceVariance: "47",
          },
          blendMode: true,
          alphaCurveType: "0",
          VERSION: "1.0.0",
        });

        createjs.Ticker.framerate = 60;
        createjs.Ticker.on("tick", function () {
          particleSystem1.update();
          particleSystem2.update();
          snowParticleSystem.update();
          stage.update();
        });
      } else {
        console.log("Particle libraries not loaded");
      }
    </script>
    <script>
      function applySepiaToCanvas(context, width, height) {
        const imageData = context.getImageData(0, 0, width, height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const gray = 0.3 * data[i] + 0.59 * data[i + 1] + 0.11 * data[i + 2];
          data[i] = gray + 95;
          data[i + 1] = gray + 58;
          data[i + 2] = gray;
        }

        context.putImageData(imageData, 0, 0);
      }

      window.onload = function () {
        const imageContainer = document.querySelector(".image-container");
        const image = document.querySelector(".foreground-image");
        const canvas = document.createElement("canvas");
        canvas.className = "wave-canvas";
        const ctx = canvas.getContext("2d");
        const img = new Image();
        img.src = image.src;

        img.onload = function () {
          const canvasSize = 150;
          canvas.width = canvasSize;
          canvas.height = canvasSize;

          const dx = (canvasSize - img.width) / 2;
          const dy = (canvasSize - img.height) / 2;

          imageContainer.appendChild(canvas);
          image.style.display = "none";

          animate(dx, dy);
          applySepiaToCanvas(ctx, canvasSize, canvasSize);
        };

        let waveAmplitude = 3;
        let waveFrequency = 0.05;
        let waveOffset = 10;
        let waveSpeed = 0.03;

        function animate(dx, dy) {
          waveOffset += waveSpeed;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (let y = 0; y < img.height; y++) {
            ctx.drawImage(
              img,
              0,
              y,
              img.width,
              1,
              dx + waveAmplitude * Math.sin(y * waveFrequency + waveOffset),
              dy + y,
              img.width,
              1
            );
          }

          requestAnimationFrame(() => animate(dx, dy));
        }
      };
    </script>
  </body>
</html>
