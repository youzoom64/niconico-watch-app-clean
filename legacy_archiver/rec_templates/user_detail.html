<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Chat Data</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Noto Serif JP", serif;
        background-color: black;
        color: white;
      }
      #chat-data {
        display: none;
      }
      a {
        color: #add8e6;
      }
      a:hover {
        color: #ffa07a;
      }
      button {
        background-color: #555;
        color: white;
      }
      table {
        border-color: white;
      }
      .image-container {
        position: relative;
        width: 400px;
        height: 400px;
        margin: 0 auto;
      }
      .background {
        position: absolute;
        display: block;
        top: 0;
        left: 0;
        z-index: 0;
      }
      .background-circle {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(
          circle at center,
          transparent 0%,
          transparent 0%,
          black 70%,
          black 70%
        );
        z-index: 3;
      }
      .foreground-image {
        position: absolute;
        z-index: 0;
        width: 400px;
        border-radius: 50%;
        top: 0;
        left: 0;
        filter: sepia(100%);
      }

      .wave-canvas {
        position: absolute;
        z-index: 2;
        width: 395px;
        height: 395px;
        border-radius: 50%;
        top: 1px;
        left: 2px;
      }

      .particles-background {
        position: absolute;
        width: 100%;
        height: 300%;
        top: 0;
        left: 0;
        z-index: -1;
      }
      p {
        text-shadow: 2px 2px 4px #2e2e2e;
      }
      h1 {
        text-shadow: 2px 2px 4px #2e2e2e;
      }
    </style>
  </head>

  <body>
    <h1 style="text-align: center">{{broadcast_title}}</h1>
    <p style="text-align: center"><b>{{start_time}}</b></p>
    <br /><br /><br /><br />
    <h1 style="font-size: 70px; color: red; text-align: center">対象者</h1>
    <div class="image-container">
      <div class="background-circle"></div>
      <img
        class="foreground-image"
        src="{{user_avatar}}"
        alt="Thumbnail"
        style="display: none"
        onerror="this.src='https://secure-dcdn.cdn.nimg.jp/nicoaccount/usericon/defaults/blank.jpg'"
      />
      <canvas class="wave-canvas" width="150" height="150"></canvas>
    </div>
    <p style="font-size: 50px; color: red; text-align: center">
      <b><a href="{{user_profile_url}}">{{user_name}}</a></b>
    </p>
    <p style="color: red; text-align: center">
      <b>アカウントID:{{user_id}}</b>
    </p>
    <div style="display: flex; justify-content: center; font-size: 40px">
      <button
        onclick="toggleDiv()"
        style="font-size: 20px; padding: 10px 20px; width: 200px; height: 60px"
      >
        コメントを表示
      </button>
    </div>
    <div
      id="chat-data"
      style="display: none; justify-content: center; align-items: center"
    >
      <table border="1">
        <thead>
          <tr>
            <th>コメント番号</th>
            <th>放送内時間</th>
            <th>日時</th>
            <th>コメント内容</th>
          </tr>
        </thead>
        <tbody>
          {{comment_rows}}
        </tbody>
      </table>
    </div>
    <h1 style="font-size: 50px; color: red">コメント分析結果</h1>
    <p>
      <b style="font-size: 20px; color: red"> {{analysis_text}} </b>
    </p>
    <br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br />

    <canvas
      class="particles-background"
      width="1889"
      height="911"
      style="width: 100%; height: 100%"
    ></canvas>

    <script src="../../templates/chara_particles.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var div = document.getElementById("chat-data");
        div.style.display = "none";
      });

      function toggleDiv() {
        var div = document.getElementById("chat-data");
        if (div.style.display === "none") {
          div.style.display = "block";
        } else {
          div.style.display = "none";
        }
      }
    </script>
    <script>
      var particles = Particles.init({
        selector: ".particles-background",
        sizeVariations: 10,
        color: ["#FF0000", "#800000", "#FF6347", "#FFFF00"],
        connectParticles: true,
        maxParticles: 200,
      });

      function applySepiaToCanvas(context, width, height) {
        const imageData = context.getImageData(0, 0, width, height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const gray = 0.3 * data[i] + 0.59 * data[i + 1] + 0.11 * data[i + 2];
          data[i] = gray + 95;
          data[i + 1] = gray + 58;
          data[i + 2] = gray;
        }

        context.putImageData(imageData, 0, 0);
      }

      window.onload = function () {
        const imageContainer = document.querySelector(".image-container");
        const image = document.querySelector(".foreground-image");
        const canvas = document.createElement("canvas");
        canvas.className = "wave-canvas";
        const ctx = canvas.getContext("2d");
        const img = new Image();
        img.src = image.src;

        img.onload = function () {
          const canvasSize = 150;
          canvas.width = canvasSize;
          canvas.height = canvasSize;

          const dx = (canvasSize - img.width) / 2;
          const dy = (canvasSize - img.height) / 2;

          imageContainer.appendChild(canvas);
          image.style.display = "none";

          animate(dx, dy);
          applySepiaToCanvas(ctx, canvasSize, canvasSize);
        };

        let waveAmplitude = 3;
        let waveFrequency = 0.05;
        let waveOffset = 10;
        let waveSpeed = 0.03;

        function animate(dx, dy) {
          waveOffset += waveSpeed;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (let y = 0; y < img.height; y++) {
            ctx.drawImage(
              img,
              0,
              y,
              img.width,
              1,
              dx + waveAmplitude * Math.sin(y * waveFrequency + waveOffset),
              dy + y,
              img.width,
              1
            );
          }

          requestAnimationFrame(() => animate(dx, dy));
        }
      };
    </script>
  </body>
</html>
